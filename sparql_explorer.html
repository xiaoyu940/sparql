<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>rs-ontop SPARQL Explorer</title>
    <link href='https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --accent: #818cf8;
            --error: #ef4444;
            --success: #10b981;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }
        .container { width: 90%; max-width: 1000px; margin: 40px auto; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); margin-bottom: 30px; }
        .group-label { font-size: 0.8rem; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; display: block; }
        #query-input { width: 100%; height: 200px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; color: #fff; font-family: 'Fira Code', monospace; }
        button { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; border-radius: 8px; padding: 15px 30px; font-weight: 600; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { color: var(--primary); }
    </style>
</head>
<body>
    <div class='container'>
        <div class='card'>
            <h1>SPARQL Explorer</h1>
            <input type='text' id='url' value='http://127.0.0.1:5820/sparql' style='width:100%; padding:10px; margin-bottom:10px; background:#000; color:#38bdf8; border:1px solid #333;'>
            <textarea id='query-input'>PREFIX ex: <http://example.org/>
SELECT DISTINCT ?deptName
WHERE {
    ?emp ex:department_id ?dept .
    ?dept ex:department_name ?deptName .
}
ORDER BY ?deptName</textarea>
            <button id='run'>Run Query</button>
            <div id='status' style='margin-top:10px; color:#94a3b8;'></div>
        </div>
        <div class='card' id='results' style='display:none'>
            <table id='tbl'><thead><tr id='th'></tr></thead><tbody id='tb'></tbody></table>
        </div>
    </div>
    <script>
        document.getElementById('run').onclick = async () => {
            const query = document.getElementById('query-input').value;
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            status.innerText = 'Running...';
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'query=' + encodeURIComponent(query)
                });
                const data = await res.json();
                status.innerText = 'Done.';
                show(data);
            } catch (e) { status.innerText = 'Error: ' + e; }
        };
        function show(data) {
            document.getElementById('results').style.display = 'block';
            const head = document.getElementById('th');
            const body = document.getElementById('tb');
            head.innerHTML = ''; body.innerHTML = '';
            const vars = data.head.vars;
            vars.forEach(v => { const th = document.createElement('th'); th.innerText = v; head.appendChild(th); });
            data.results.bindings.forEach(row => {
                const tr = document.createElement('tr');
                vars.forEach(v => { const td = document.createElement('td'); td.innerText = row[v] ? row[v].value : '-'; tr.appendChild(td); });
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
