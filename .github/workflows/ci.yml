name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Cargo check
        run: cargo check -q

      - name: Unit tests (lib)
        run: cargo test -q --lib

      - name: Clippy
        run: cargo clippy -q
